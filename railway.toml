# Railway 部署配置（web 服务：FastAPI 指令应答）。
# 批处理采价在 GitHub Actions，不在 Railway（Tech Spec §1.1）。
# 启动命令沿用 Procfile（uvicorn ... --port $PORT），此处只补健康检查与重启策略。

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
